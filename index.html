<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<script
			type="module"
			src="https://unpkg.com/@jaak.ai/document-detector"></script>
	</head>
	<body>
		<div class="content">
			<div class="card">
				<div class="card-content">
                    <div class="card-title">
                        <h1>Document Detector</h1>
                    </div>
					<div class="component-container">
						<document-detector></document-detector>
					</div>
				</div>
			</div>
		</div>
	</body>
	<style>
		.content {
			height: 90vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 10px;
            margin-top: 1rem;
		}
		.card {
			border-radius: 10px;
			box-shadow: 0 10px 40px 0 rgba(32, 41, 69, 0.1);
			height: 100%;
			max-height: 560px;
			width: 80%;
            .card-title {
                text-align: center;
                margin-bottom: 20px;
            }
		}
	</style>
	<script>
		const detector = document.querySelector('document-detector');
		const userConfig = {
			key: '',
			mode: 'video-camera',
			accept: 'image/*',
			placeholder: '',
			cameraSource: 'environment',
			width: '100%',
			height: '100%',
			video: {
				aspectRatio: 16 / 9,
				width: { ideal: 1280, max: 1280, min: 640 },
				height: { ideal: 720, max: 720, min: 360 },
				advanced: [
					{ width: { ideal: 1280, exact: 1280 } },
					{ width: { exact: 1024 } },
					{ width: { exact: 900 } },
					{ width: { exact: 800 } },
					{ width: { exact: 640 } },
					{ width: { exact: 320 } },
				],
			},
			documentDetect: true,
			size: 2048,
			translate: {
				front: 'Acerca el doc',
				back: 'Acerca el reverso del doc',
				changeSide: 'Voltea tu doc',
				adjustAngle: 'Rota tu doc',
				cameraFeedbackBlur: 'No te muevas',
			},
		};

		detector.config = userConfig;
		//QhAQTll
	</script>
</html>
