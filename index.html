<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document Detector - Ejemplo Avanzado</title>

    <script
            type="module"
            src="https://unpkg.com/@jaak.ai/stamps@1.0.0-beta.1"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .detector-container {
            display: flex;
            justify-content: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 10px 15px;
            background-color: #4a7e4a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .status-panel {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .status-active {
            background-color: #4CAF50;
        }

        .status-waiting {
            background-color: #FFC107;
        }

        .status-error {
            background-color: #F44336;
        }

        .results-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .document-info {
            flex: 1;
            min-width: 300px;
        }

        .document-images {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .image-container {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 200px;
        }

        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow: auto;
            max-height: 300px;
        }
        
        document-detector {
            width: 800%;
            height: 600px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Detector de Documentos - Ejemplo Avanzado</h1>

    <div class="detector-container">
        <document-detector id="documentDetector"></document-detector>
    </div>

    <div class="controls">
        <button id="switchModeBtn">Cambiar modo</button>
        <button id="stopBtn">Detener</button>
        <button id="restartBtn">Reiniciar</button>
        <button id="uploadBtn">Subir archivo</button>
    </div>

    <div class="status-panel">
        <h3>Estado del Detector</h3>
        <div>
            <span id="statusIndicator" class="status-indicator status-waiting"></span>
            <span id="statusText">Inicializando...</span>
        </div>
    </div>

    <div class="results-panel">
        <div class="document-info">
            <h3>Información del Documento</h3>
            <div id="documentInfo">
                <p>Esperando detección de documento...</p>
            </div>
        </div>

        <div class="document-images">
            <h3>Imágenes Capturadas</h3>
            <div id="documentImages">
                <p>No hay imágenes disponibles</p>
            </div>
        </div>
    </div>

    <div>
        <h3>Datos Completos (JSON)</h3>
        <pre id="jsonOutput">Esperando resultados...</pre>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const detector = document.getElementById('documentDetector');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const documentInfo = document.getElementById('documentInfo');
        const documentImages = document.getElementById('documentImages');
        const jsonOutput = document.getElementById('jsonOutput');
        
        // Configurar el componente
        detector.config = {
            key: '',
            width: '640px',
            height: '480px',
            mode: 'video-camera',
            placeholder: 'Selecciona un documento',
            buttonText: 'Subir documento',
            size: 2048,
            translate: {
                front: 'Acerca la parte frontal de tu documento',
                back: 'Acerca la parte trasera de tu documento',
                changeSide: 'Voltea tu documento',
                adjustAngle: 'Ajusta el ángulo',
                cameraFeedbackBlur: 'Mantén la cámara estable'
            },
            sdkConfig: {
                forceMobileMode: true
            }
        };
        
        // Manejar eventos de estado
        detector.addEventListener('status', (event) => {
            const status = event.detail;
            statusText.textContent = status;
            
            // Actualizar indicador visual según el estado
            statusIndicator.className = 'status-indicator';
            
            if (status.includes('ERROR') || status.includes('FAILED')) {
                statusIndicator.classList.add('status-error');
            } else if (status.includes('SUCCESS') || status.includes('DETECTED')) {
                statusIndicator.classList.add('status-active');
            } else {
                statusIndicator.classList.add('status-waiting');
            }
        });
        
        // Manejar resultados
        detector.addEventListener('results', (event) => {
            const data = event.detail;
            jsonOutput.textContent = JSON.stringify(data, null, 2);
            
            if (data && data.documentData) {
                const generalData = data.documentData.generalData;
                
                // Mostrar información del documento
                let infoHTML = '';
                
                if (generalData) {
                    infoHTML += `
              <p><strong>Tipo:</strong> ${generalData.type || 'No disponible'}</p>
              <p><strong>Nombre:</strong> ${generalData.name || 'No disponible'}</p>
              <p><strong>Apellido:</strong> ${generalData.surname || 'No disponible'}</p>
              <p><strong>Segundo Apellido:</strong> ${generalData.motherSurname || 'No disponible'}</p>
              <p><strong>Género:</strong> ${generalData.gender || 'No disponible'}</p>
              <p><strong>Fecha de Nacimiento:</strong> ${generalData.birthDate || 'No disponible'}</p>
              <p><strong>Dirección:</strong> ${generalData.address || 'No disponible'}</p>
              <p><strong>Nacionalidad:</strong> ${generalData.nationality || 'No disponible'}</p>
            `;
                }
                
                // Mostrar datos específicos si existen
                if (data.documentData.specificData && data.documentData.specificData.length > 0) {
                    infoHTML += '<h4>Datos Específicos:</h4><ul>';
                    
                    data.documentData.specificData.forEach(item => {
                        infoHTML += `<li><strong>${item.label}:</strong> ${item.value}</li>`;
                    });
                    
                    infoHTML += '</ul>';
                }
                
                documentInfo.innerHTML = infoHTML;
                
                // Mostrar imágenes
                if (generalData && generalData.documentImage) {
                    const images = generalData.documentImage;
                    let imagesHTML = '';
                    
                    if (images.front) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Frente</h4>
                  <img src="data:image/png;base64,${images.front}" alt="Frente del documento">
                </div>
              `;
                    }
                    
                    if (images.back) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Reverso</h4>
                  <img src="data:image/png;base64,${images.back}" alt="Reverso del documento">
                </div>
              `;
                    }
                    
                    if (images.frontFull) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Frente Completo</h4>
                  <img src="data:image/png;base64,${images.frontFull}" alt="Frente completo del documento">
                </div>
              `;
                    }
                    
                    if (images.backFull) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Reverso Completo</h4>
                  <img src="data:image/png;base64,${images.backFull}" alt="Reverso completo del documento">
                </div>
              `;
                    }
                    
                    if (images.face) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Rostro</h4>
                  <img src="data:image/png;base64,${images.face}" alt="Rostro">
                </div>
              `;
                    }
                    
                    if (images.signature) {
                        imagesHTML += `
                <div class="image-container">
                  <h4>Firma</h4>
                  <img src="data:image/png;base64,${images.signature}" alt="Firma">
                </div>
              `;
                    }
                    
                    documentImages.innerHTML = imagesHTML || '<p>No hay imágenes disponibles</p>';
                }
            } else {
                documentInfo.innerHTML = '<p>No se detectó información del documento</p>';
                documentImages.innerHTML = '<p>No hay imágenes disponibles</p>';
            }
        });
        
        // Manejar errores
        detector.addEventListener('componentError', (event) => {
            console.error('Error:', event.detail);
            statusIndicator.className = 'status-indicator status-error';
            statusText.textContent = `ERROR: ${JSON.stringify(event.detail)}`;
        });
        
        // Configurar botones
        document.getElementById('switchModeBtn').addEventListener('click', async () => {
            const currentMode = await detector.getMode();
            detector.switchMode(currentMode === 'video-camera' ? 'upload-file' : 'video-camera');
        });
        
        document.getElementById('stopBtn').addEventListener('click', () => {
            detector.stopComponent();
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            detector.restartComponent();
        });
        
        document.getElementById('uploadBtn').addEventListener('click', () => {
            detector.uploadFile();
        });
    });
</script>
</body>
</html>
